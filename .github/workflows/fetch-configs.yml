name: Fetch VPN Configs

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL источника (оставьте пустым для обновления всех из sources.json)"
        required: false
        type: string
      count:
        description: "Сколько конфигов взять из URL (0 = по умолчанию из sources.json)"
        required: false
        default: "0"
        type: string
      filename:
        description: "Имя выходного файла (обязательно если указан url)"
        required: false
        type: string
      random:
        description: "Перемешивать конфиги перед выборкой (true/false)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and check configs
        run: |
          check_alive() {
            local HOSTPORT="$1"
            local HOST=$(echo "$HOSTPORT" | cut -d: -f1)
            local PORT=$(echo "$HOSTPORT" | cut -d: -f2)
            [ -z "$HOST" ] || [ -z "$PORT" ] && return 1
            timeout 3 bash -c "echo >/dev/tcp/$HOST/$PORT" 2>/dev/null
          }

          extract_hostport() {
            echo "$1" | sed -n 's|.*@\([^?]*\).*|\1|p'
          }

          fetch_and_filter() {
            local URL="$1"
            local TARGET="$2"
            local FILENAME="$3"
            local RANDOMIZE="$4"
            local OUTFILE="configs/$FILENAME"

            echo "=== $FILENAME: target=$TARGET configs ==="

            # Берём с запасом (x3), чтобы было из чего докачать
            local FETCH=$((TARGET * 3))
            local TMPRAW=$(mktemp)

            echo "  Fetching $FETCH configs from source..."
            if [ "$RANDOMIZE" = "true" ]; then
              echo "  Mode: random"
              curl -sL "$URL" | grep '^vless://' | shuf | head -n "$FETCH" > "$TMPRAW"
            else
              echo "  Mode: sequential"
              curl -sL "$URL" | grep '^vless://' | head -n "$FETCH" > "$TMPRAW"
            fi
            local TOTAL=$(wc -l < "$TMPRAW")
            echo "  Got $TOTAL configs from source"

            local ALIVEFILE=$(mktemp)
            local ALIVE=0
            local CHECKED=0

            while IFS= read -r LINE; do
              [ -z "$LINE" ] && continue
              CHECKED=$((CHECKED + 1))
              local HP=$(extract_hostport "$LINE")

              if check_alive "$HP"; then
                echo "  ALIVE: $HP"
                echo "$LINE" >> "$ALIVEFILE"
                ALIVE=$((ALIVE + 1))
              else
                echo "  DEAD:  $HP"
              fi

              # Достаточно живых — стоп
              [ "$ALIVE" -ge "$TARGET" ] && break
            done < "$TMPRAW"

            # Берём ровно TARGET живых
            head -n "$TARGET" "$ALIVEFILE" > "$OUTFILE"
            local FINAL=$(wc -l < "$OUTFILE")

            rm -f "$TMPRAW" "$ALIVEFILE"
            echo "  Result: $FINAL/$TARGET alive configs saved"
          }

          # Определяем что запускать
          INPUT_URL="${{ github.event.inputs.url }}"
          INPUT_COUNT="${{ github.event.inputs.count }}"
          INPUT_FILENAME="${{ github.event.inputs.filename }}"
          INPUT_RANDOM="${{ github.event.inputs.random }}"
          # По умолчанию (schedule) — без рандома
          [ -z "$INPUT_RANDOM" ] && INPUT_RANDOM="false"

          if [ -n "$INPUT_URL" ]; then
            # Ручной запуск с URL
            if [ -z "$INPUT_FILENAME" ]; then
              echo "Error: filename required when url specified"
              exit 1
            fi
            COUNT="$INPUT_COUNT"
            [ "$COUNT" = "0" ] || [ -z "$COUNT" ] && COUNT=20
            fetch_and_filter "$INPUT_URL" "$COUNT" "$INPUT_FILENAME" "$INPUT_RANDOM"
          else
            # Все списки из sources.json
            if [ ! -f sources.json ]; then
              echo "No sources.json found"
              exit 0
            fi

            LIST_COUNT=$(jq '.lists | length' sources.json)
            echo "Found $LIST_COUNT lists in sources.json"

            for i in $(seq 0 $((LIST_COUNT - 1))); do
              URL=$(jq -r ".lists[$i].url" sources.json)
              FILENAME=$(jq -r ".lists[$i].filename" sources.json)
              ITEMS=$(jq -r ".lists[$i].count" sources.json)

              # Входной count перекрывает sources.json
              if [ "$INPUT_COUNT" != "0" ] && [ -n "$INPUT_COUNT" ]; then
                ITEMS="$INPUT_COUNT"
              fi

              [ "$ITEMS" = "null" ] || [ -z "$ITEMS" ] && ITEMS=20

              fetch_and_filter "$URL" "$ITEMS" "$FILENAME" "$INPUT_RANDOM"
            done
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add configs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update configs $(TZ=Europe/Moscow date '+%Y-%m-%d %H:%M')"
            git push
          fi
