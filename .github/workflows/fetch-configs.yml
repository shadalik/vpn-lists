name: Fetch VPN Configs

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL источника (оставьте пустым для обновления всех из sources.json)"
        required: false
        type: string
      count:
        description: "Сколько конфигов взять из URL (0 = по умолчанию из sources.json)"
        required: false
        default: "0"
        type: string
      filename:
        description: "Имя выходного файла (обязательно если указан url)"
        required: false
        type: string
      protocols:
        description: "Протоколы через запятую (vless,vmess,trojan,shadowsocks,hysteria2,tuic)"
        required: false
        default: "vless"
        type: string
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and check configs
        run: |
          check_alive() {
            local HOSTPORT="$1"
            local HOST=$(echo "$HOSTPORT" | cut -d: -f1)
            local PORT=$(echo "$HOSTPORT" | cut -d: -f2)
            [ -z "$HOST" ] || [ -z "$PORT" ] && return 1
            timeout 3 bash -c "echo >/dev/tcp/$HOST/$PORT" 2>/dev/null
          }

          extract_hostport() {
            echo "$1" | sed -n 's|.*@\([^?]*\).*|\1|p'
          }

          fetch_and_save() {
            local FILENAME="$1"
            local TARGET="$2"
            local OUTFILE="configs/$FILENAME"

            echo "=== $FILENAME: target=$TARGET ==="

            # Собираем сырые конфиги со всех источников в один файл
            local TMPRAW=$(mktemp)
            > "$TMPRAW"

            local ENTRY_COUNT=$(jq -c ".lists[] | select(.filename == \"$FILENAME\")" sources.json | wc -l)
            echo "  Sources: $ENTRY_COUNT"

            local SUM_TARGET=0
            while IFS= read -r ENTRY; do
              local URL=$(echo "$ENTRY" | jq -r '.url')
              local ITEMS=$(echo "$ENTRY" | jq -r '.count')
              local PROTOCOLS=$(echo "$ENTRY" | jq -r '.protocols // ["vless"] | join(",")')
              local RANDOMIZE=$(echo "$ENTRY" | jq -r '.random // false')

              # Входной count перекрывает sources.json
              if [ "${INPUT_COUNT:-0}" != "0" ] && [ -n "${INPUT_COUNT:-}" ]; then
                ITEMS="$INPUT_COUNT"
              fi

              # Входной protocols перекрывает sources.json
              if [ -n "${INPUT_PROTOCOLS:-}" ]; then
                PROTOCOLS="$INPUT_PROTOCOLS"
              fi

              [ "$ITEMS" = "null" ] || [ -z "$ITEMS" ] && ITEMS=10
              SUM_TARGET=$((SUM_TARGET + ITEMS))

              local GREP_PATTERN="^($(echo "$PROTOCOLS" | tr ',' '|'))://"
              local FETCH=$((ITEMS * 3))

              echo "  <- $URL (protocols=$PROTOCOLS, count=$ITEMS, random=$RANDOMIZE)"
              if [ "$RANDOMIZE" = "true" ]; then
                curl -sL "$URL" | grep -E "$GREP_PATTERN" | shuf | head -n "$FETCH" >> "$TMPRAW"
              else
                curl -sL "$URL" | grep -E "$GREP_PATTERN" | head -n "$FETCH" >> "$TMPRAW"
              fi
            done < <(jq -c ".lists[] | select(.filename == \"$FILENAME\")" sources.json)

            local TOTAL=$(wc -l < "$TMPRAW")
            echo "  Raw total: $TOTAL configs from all sources"

            # Проверяем живость
            local ALIVEFILE=$(mktemp)
            local ALIVE=0
            local CHECKED=0

            # Перемешиваем если хотя бы один source random=true
            local ANY_RANDOM=$(jq -r "[.lists[] | select(.filename == \"$FILENAME\") | .random // false] | any" sources.json)
            if [ "$ANY_RANDOM" = "true" ]; then
              shuf "$TMPRAW" -o "$TMPRAW"
            fi

            while IFS= read -r LINE; do
              [ -z "$LINE" ] && continue
              CHECKED=$((CHECKED + 1))
              local HP=$(extract_hostport "$LINE")

              if check_alive "$HP"; then
                echo "  ALIVE: $HP"
                echo "$LINE" >> "$ALIVEFILE"
                ALIVE=$((ALIVE + 1))
              else
                echo "  DEAD:  $HP"
              fi

              [ "$ALIVE" -ge "$SUM_TARGET" ] && break
            done < "$TMPRAW"

            rm -f "$TMPRAW"

            # Защита от пустого результата — сохраняем старый файл
            if [ "$ALIVE" -eq 0 ]; then
              if [ -f "$OUTFILE" ] && [ -s "$OUTFILE" ]; then
                echo "  WARNING: no alive configs, keeping old file ($(wc -l < "$OUTFILE") configs)"
              else
                echo "  WARNING: no alive configs and no old file to keep"
              fi
              rm -f "$ALIVEFILE"
              return
            fi

            # Берём не более SUM_TARGET живых
            head -n "$SUM_TARGET" "$ALIVEFILE" > "$OUTFILE"
            local FINAL=$(wc -l < "$OUTFILE")

            rm -f "$ALIVEFILE"
            echo "  Result: $FINAL/$SUM_TARGET alive configs saved"
          }

          # Определяем что запускать
          INPUT_URL="${{ github.event.inputs.url }}"
          INPUT_COUNT="${{ github.event.inputs.count }}"
          INPUT_FILENAME="${{ github.event.inputs.filename }}"
          INPUT_PROTOCOLS="${{ github.event.inputs.protocols }}"

          if [ -n "$INPUT_URL" ]; then
            # Ручной запуск с URL
            if [ -z "$INPUT_FILENAME" ]; then
              echo "Error: filename required when url specified"
              exit 1
            fi
            COUNT="$INPUT_COUNT"
            [ "$COUNT" = "0" ] || [ -z "$COUNT" ] && COUNT=20
            PROTOCOLS="$INPUT_PROTOCOLS"
            [ -z "$PROTOCOLS" ] && PROTOCOLS="vless"
            # Ручной запуск — перемешиваем по умолчанию
            echo "=== $INPUT_FILENAME: target=$COUNT, protocols=$PROTOCOLS ==="
            GREP_PATTERN="^($(echo "$PROTOCOLS" | tr ',' '|'))://"
            TMPRAW=$(mktemp)
            curl -sL "$INPUT_URL" | grep -E "$GREP_PATTERN" | shuf | head -n "$COUNT" > "$TMPRAW"
            ALIVEFILE=$(mktemp)
            ALIVE=0
            while IFS= read -r LINE; do
              [ -z "$LINE" ] && continue
              HP=$(extract_hostport "$LINE")
              if check_alive "$HP"; then
                echo "  ALIVE: $HP"
                echo "$LINE" >> "$ALIVEFILE"
                ALIVE=$((ALIVE + 1))
              else
                echo "  DEAD:  $HP"
              fi
              [ "$ALIVE" -ge "$COUNT" ] && break
            done < "$TMPRAW"
            if [ "$ALIVE" -eq 0 ] && [ -f "configs/$INPUT_FILENAME" ] && [ -s "configs/$INPUT_FILENAME" ]; then
              echo "  WARNING: no alive configs, keeping old file"
            else
              head -n "$COUNT" "$ALIVEFILE" > "configs/$INPUT_FILENAME"
              echo "  Result: $(wc -l < "configs/$INPUT_FILENAME")/$COUNT alive configs saved"
            fi
            rm -f "$TMPRAW" "$ALIVEFILE"
          else
            # Все списки из sources.json
            if [ ! -f sources.json ]; then
              echo "No sources.json found"
              exit 0
            fi

            LIST_COUNT=$(jq '.lists | length' sources.json)
            echo "Found $LIST_COUNT entries in sources.json"

            mkdir -p configs

            # Группируем по уникальным filename
            UNIQUE_FILES=$(jq -r '[.lists[].filename] | unique | .[]' sources.json)
            for FILENAME in $UNIQUE_FILES; do
              # Считаем суммарный target для этого файла
              TARGET=$(jq -r "[.lists[] | select(.filename == \"$FILENAME\") | .count] | add" sources.json)
              [ "$TARGET" = "null" ] && TARGET=20
              fetch_and_save "$FILENAME" "$TARGET"
            done
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add configs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update configs $(TZ=Europe/Moscow date '+%Y-%m-%d %H:%M')"
            git push
          fi
