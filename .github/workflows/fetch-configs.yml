name: Fetch VPN Configs

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL –Є—Б—В–Њ—З–љ–Є–Ї–∞ (–Њ—Б—В–∞–≤—М—В–µ –њ—Г—Б—В—Л–Љ –і–ї—П –Њ–±–љ–Њ–≤–ї–µ–љ–Є—П –≤—Б–µ—Е –Є–Ј sources.json)"
        required: false
        type: string
      count:
        description: "–°–Ї–Њ–ї—М–Ї–Њ –Ї–Њ–љ—Д–Є–≥–Њ–≤ –≤–Ј—П—В—М –Є–Ј URL (0 = –њ–Њ —Г–Љ–Њ–ї—З–∞–љ–Є—О –Є–Ј sources.json)"
        required: false
        default: "0"
        type: string
      filename:
        description: "–Ш–Љ—П –≤—Л—Е–Њ–і–љ–Њ–≥–Њ —Д–∞–є–ї–∞ (–Њ–±—П–Ј–∞—В–µ–ї—М–љ–Њ –µ—Б–ї–Є —Г–Ї–∞–Ј–∞–љ url)"
        required: false
        type: string
      protocols:
        description: "–Я—А–Њ—В–Њ–Ї–Њ–ї—Л —З–µ—А–µ–Ј –Ј–∞–њ—П—В—Г—О (vless,vmess,trojan,shadowsocks,hysteria2,tuic)"
        required: false
        default: "vless"
        type: string
      checker:
        description: "–І–µ–Ї–µ—А: sing-box (—А–µ–∞–ї—М–љ–∞—П –њ—А–Њ–≤–µ—А–Ї–∞), xray (Xray Core) –Є–ї–Є tcp (—В–Њ–ї—М–Ї–Њ –њ–Њ—А—В)"
        required: false
        default: "sing-box"
        type: choice
        options:
          - sing-box
          - xray
          - tcp
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Download sing-box
        run: |
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64) ARCH="amd64" ;;
            aarch64) ARCH="arm64" ;;
          esac
          VERSION=$(curl -sL "https://api.github.com/repos/SagerNet/sing-box/releases/latest" | jq -r '.tag_name')
          echo "Downloading sing-box $VERSION for $ARCH"
          curl -sL "https://github.com/SagerNet/sing-box/releases/download/${VERSION}/sing-box-${VERSION#v}-linux-${ARCH}.tar.gz" | tar xz --strip-components=1
          chmod +x sing-box
          ./sing-box version

      - name: Download Xray Checker
        run: |
          INPUT_CHECKER="${{ github.event.inputs.checker }}"
          if [ "$INPUT_CHECKER" = "xray" ]; then
            NEED_XRAY="true"
          elif [ -n "$INPUT_CHECKER" ] && [ "$INPUT_CHECKER" != "" ]; then
            NEED_XRAY="false"
          else
            NEED_XRAY=$(jq -r '[.lists[].checker // "sing-box"] | map(select(. == "xray")) | length > 0' sources.json)
          fi

          if [ "$NEED_XRAY" = "true" ]; then
            echo "Xray Checker needed, downloading..."
            ARCH=$(uname -m)
            case "$ARCH" in
              x86_64) ARCH="amd64" ;;
              aarch64) ARCH="arm64" ;;
            esac
            VERSION=$(curl -sL "https://api.github.com/repos/kutovoys/xray-checker/releases/latest" | jq -r '.tag_name')
            echo "Downloading xray-checker $VERSION for $ARCH"
            curl -sL "https://github.com/kutovoys/xray-checker/releases/download/${VERSION}/xray-checker-${VERSION}-linux-${ARCH}.tar.gz" | tar xz
            chmod +x xray-checker
            ./xray-checker --version
          else
            echo "Xray Checker not needed, skipping"
          fi

      - name: Fetch and check configs
        run: |
          # === sing-box checker ===
          check_one_singbox() {
            local LINE="$1"
            local PORT="$2"
            local OUTFILE="$3"

            local SCHEME=$(echo "$LINE" | sed -E 's|^([a-z]+)://.*|\1|')
            local WITHOUT_SCHEME=$(echo "$LINE" | sed -E 's|^[a-z]+://||')
            local USERINFO=$(echo "$WITHOUT_SCHEME" | sed -E 's|@.*||')
            local AFTER_AT=$(echo "$WITHOUT_SCHEME" | sed -E 's|[^@]*@||')
            local HOST=$(echo "$AFTER_AT" | sed -E 's|[:/?#].*||')
            local PORT_STR=$(echo "$AFTER_AT" | sed -E 's|[^:]*:([0-9]+).*|\1|')
            local QUERY=$(echo "$LINE" | sed -E 's|^[^?]*\?([^#]*).*|\1|')

            if [ -z "$HOST" ] || [ -z "$PORT_STR" ]; then
              return 1
            fi

            # –Ш–Ј–≤–ї–µ–Ї–∞–µ–Љ –њ–∞—А–∞–Љ–µ—В—А—Л
            local PARAM_SNI=$(echo "$QUERY" | grep -oP '(?<=sni=)[^&#]*' || true)
            local PARAM_PBK=$(echo "$QUERY" | grep -oP '(?<=pbk=)[^&#]*' || true)
            local PARAM_SID=$(echo "$QUERY" | grep -oP '(?<=sid=)[^&#]*' || true)
            local PARAM_FLOW=$(echo "$QUERY" | grep -oP '(?<=flow=)[^&#]*' || true)
            local PARAM_SECURITY=$(echo "$QUERY" | grep -oP '(?<=security=)[^&#]*' || true)
            local PARAM_TYPE=$(echo "$QUERY" | grep -oP '(?<=type=)[^&#]*' || true)
            local PARAM_FP=$(echo "$QUERY" | grep -oP '(?<=fp=)[^&#]*' || true)

            # –§–Є–ї—М—В—А—Г–µ–Љ –±–Є—В—Л–µ
            if [ "$PARAM_SECURITY" = "none" ] || [ "$PARAM_SECURITY" = "false" ]; then
              return 1
            fi

            local OUTBOUND=""

            if [ "$SCHEME" = "vless" ]; then
              if [ -z "$PARAM_PBK" ]; then
                # –Э–µ—В pbk вАФ –љ–µ reality, –њ—А–Њ–≤–µ—А—П–µ–Љ tls
                if [ "$PARAM_SECURITY" != "tls" ] && [ "$PARAM_SECURITY" != "reality" ]; then
                  return 1
                fi
              fi

              OUTBOUND=$(jq -n \
                --arg server "$HOST" \
                --argjson port "$PORT_STR" \
                --arg uuid "$USERINFO" \
                --arg flow "$PARAM_FLOW" \
                --arg security "$PARAM_SECURITY" \
                --arg sni "$PARAM_SNI" \
                --arg pbk "$PARAM_PBK" \
                --arg sid "$PARAM_SID" \
                --arg fp "$PARAM_FP" \
                --arg net_type "$PARAM_TYPE" '{
                type: "vless",
                tag: "proxy",
                server: $server,
                server_port: $port,
                uuid: $uuid,
                flow: (if $flow != "" then $flow else null end),
                network: (if $net_type == "ws" or $net_type == "grpc" or $net_type == "http" or $net_type == "httpupgrade" then $net_type else "tcp" end),
                tls: (if $security == "reality" then {
                  enabled: true,
                  server_name: $sni,
                  utls: { enabled: true, fingerprint: (if $fp != "" then $fp else "chrome" end) },
                  reality: { enabled: true, public_key: $pbk, short_id: $sid }
                } elif $security == "tls" then {
                  enabled: true,
                  server_name: $sni,
                  insecure: true
                } else null end)
              } | with_entries(select(.value != null))')

            elif [ "$SCHEME" = "trojan" ]; then
              if [ -z "$USERINFO" ]; then
                return 1
              fi
              OUTBOUND=$(jq -n \
                --arg server "$HOST" \
                --argjson port "$PORT_STR" \
                --arg password "$USERINFO" \
                --arg sni "$PARAM_SNI" \
                --arg fp "$PARAM_FP" '{
                type: "trojan",
                tag: "proxy",
                server: $server,
                server_port: $port,
                password: $password,
                tls: {
                  enabled: true,
                  server_name: (if $sni != "" then $sni else $server end),
                  insecure: true,
                  utls: (if $fp != "" then { enabled: true, fingerprint: $fp } else null end)
                }
              } | with_entries(select(.value != null))')

            elif [ "$SCHEME" = "ss" ]; then
              # shadowsocks://base64@host:port –Є–ї–Є ss://base64
              OUTBOUND=$(jq -n \
                --arg server "$HOST" \
                --argjson port "$PORT_STR" \
                --arg method "$USERINFO" '{
                type: "shadowsocks",
                tag: "proxy",
                server: $server,
                server_port: $port,
                method: "auto",
                password: $method
              }')
            else
              return 1
            fi

            # –У–µ–љ–µ—А–Є—А—Г–µ–Љ –Ї–Њ–љ—Д–Є–≥
            local CFGFILE=$(mktemp /tmp/singbox-XXXXX.json)
            jq -n --argjson out "$OUTBOUND" --argjson port "$PORT" '{
              log: { level: "error" },
              inbounds: [{ type: "socks", listen: "127.0.0.1", listen_port: $port }],
              outbounds: [$out, { type: "direct", tag: "direct" }],
              route: { rules: [{ outbound: "proxy" }] }
            }' > "$CFGFILE"

            # –Ч–∞–њ—Г—Б–Ї–∞–µ–Љ sing-box
            ./sing-box run -c "$CFGFILE" &>/dev/null &
            local PID=$!

            # –Ц–і—С–Љ –њ–Њ—А—В
            local WAIT=0
            until nc -z 127.0.0.1 "$PORT" 2>/dev/null; do
              sleep 0.2
              WAIT=$((WAIT + 1))
              if [ "$WAIT" -ge 25 ]; then
                kill $PID 2>/dev/null; wait $PID 2>/dev/null
                rm -f "$CFGFILE"
                return 1
              fi
            done

            # –Я—А–Њ–≤–µ—А—П–µ–Љ —З–µ—А–µ–Ј SOCKS5
            local HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --socks5-hostname 127.0.0.1 "$PORT" \
              --connect-timeout 8 --max-time 10 \
              "http://connectivitycheck.gstatic.com/generate_204" 2>/dev/null || echo "000")

            kill $PID 2>/dev/null; wait $PID 2>/dev/null
            rm -f "$CFGFILE"

            if [ "$HTTP_CODE" = "204" ]; then
              return 0
            fi
            return 1
          }

          # === sing-box checker —Б –њ–∞—А–∞–ї–ї–µ–ї–Є–Ј–Љ–Њ–Љ ===
          check_with_singbox() {
            local TMPRAW="$1"
            local TARGET="$2"
            local OUTFILE="$3"
            local WORKERS="${4:-10}"

            # –§–Є–ї—М—В—А—Г–µ–Љ –±–Є—В—Л–µ –Ї–Њ–љ—Д–Є–≥–Є
            local TMPFIXED=$(mktemp)
            grep -vE 'security=(false|none)' "$TMPRAW" | \
            grep -vE '&pbk=(?:$|&)' | \
            grep -vE '^\s*$' > "$TMPFIXED"

            # –£–і–∞–ї—П–µ–Љ –Ї–Њ–љ—Д–Є–≥–Є —Б –њ—Г—Б—В—Л–Љ password (trojan://@host...)
            local TMPFIXED2=$(mktemp)
            while IFS= read -r LINE; do
              if echo "$LINE" | grep -q '^trojan://'; then
                local PASS=$(echo "$LINE" | sed -E 's|^trojan://([^@]*)@.*|\1|')
                if [ -n "$PASS" ]; then
                  echo "$LINE" >> "$TMPFIXED2"
                fi
              else
                echo "$LINE" >> "$TMPFIXED2"
              fi
            done < "$TMPFIXED"
            mv "$TMPFIXED2" "$TMPFIXED"

            local FILTERED=$(wc -l < "$TMPFIXED")
            local REMOVED=$(($(wc -l < "$TMPRAW") - FILTERED))
            [ "$REMOVED" -gt 0 ] && echo "  Filtered out $REMOVED broken configs"

            local TOTAL=$FILTERED
            if [ "$TOTAL" -eq 0 ]; then
              echo "  No configs to check"
              rm -f "$TMPFIXED"
              return 1
            fi

            echo "  Checking $TOTAL configs with sing-box (target=$TARGET, workers=$WORKERS)..."

            local TMPALIVE=$(mktemp)
            local ALIVE=0
            local BASE_PORT=20000

            # –І–Є—В–∞–µ–Љ –≤—Б–µ —Б—В—А–Њ–Ї–Є –≤ –Љ–∞—Б—Б–Є–≤
            local ALL_LINES=()
            while IFS= read -r LINE; do
              ALL_LINES+=("$LINE")
            done < "$TMPFIXED"

            local IDX=0
            while [ "$IDX" -lt "${#ALL_LINES[@]}" ] && [ "$ALIVE" -lt "$TARGET" ]; do
              # –Э–∞–±–Є—А–∞–µ–Љ –±–∞—В—З
              local PIDS=()
              local BATCH_END=$((IDX + WORKERS))
              [ "$BATCH_END" -gt "${#ALL_LINES[@]}" ] && BATCH_END=${#ALL_LINES[@]}

              for ((i=IDX; i<BATCH_END; i++)); do
                local PORT=$((BASE_PORT + (i - IDX)))
                (
                  if check_one_singbox "${ALL_LINES[$i]}" "$PORT" "/dev/null" 2>/dev/null; then
                    echo "${ALL_LINES[$i]}" >> "$TMPALIVE"
                  fi
                ) &
                PIDS+=($!)
              done

              for PID in "${PIDS[@]}"; do
                wait "$PID" 2>/dev/null
              done

              ALIVE=$(wc -l < "$TMPALIVE" 2>/dev/null || echo 0)
              echo "  Progress: $BATCH_END/$TOTAL checked, $ALIVE alive"
              IDX=$BATCH_END
            done

            ALIVE=$(wc -l < "$TMPALIVE" 2>/dev/null || echo 0)
            echo "  sing-box: $ALIVE/$TOTAL alive"

            if [ "$ALIVE" -eq 0 ]; then
              rm -f "$TMPFIXED" "$TMPALIVE"
              return 1
            fi

            head -n "$TARGET" "$TMPALIVE" > "$OUTFILE"
            local FINAL=$(wc -l < "$OUTFILE")
            echo "  Result: $FINAL alive configs saved"
            rm -f "$TMPFIXED" "$TMPALIVE"
            return 0
          }

          # Xray Checker вАФ –њ—А–Њ–≤–µ—А–Ї–∞ —З–µ—А–µ–Ј Xray Core
          check_with_xray() {
            local TMPRAW="$1"
            local TARGET="$2"
            local OUTFILE="$3"

            # –§–Є–ї—М—В—А—Г–µ–Љ –±–Є—В—Л–µ –Ї–Њ–љ—Д–Є–≥–Є –Ї–Њ—В–Њ—А—Л–µ —А–Њ–љ—П—О—В Xray Checker
            local TMPFIXED=$(mktemp)
            grep -vE 'security=(false|none)' "$TMPRAW" | \
            grep -vE '&pbk=(?:$|&)' | \
            grep -vE '^\s*$' > "$TMPFIXED"

            # –£–і–∞–ї—П–µ–Љ –Ї–Њ–љ—Д–Є–≥–Є —Б –њ—Г—Б—В—Л–Љ password (trojan://@host...)
            local TMPFIXED2=$(mktemp)
            while IFS= read -r LINE; do
              if echo "$LINE" | grep -q '^trojan://'; then
                local PASS=$(echo "$LINE" | sed -E 's|^trojan://([^@]*)@.*|\1|')
                if [ -n "$PASS" ]; then
                  echo "$LINE" >> "$TMPFIXED2"
                fi
              else
                echo "$LINE" >> "$TMPFIXED2"
              fi
            done < "$TMPFIXED"
            mv "$TMPFIXED2" "$TMPFIXED"

            local FILTERED=$(wc -l < "$TMPFIXED")
            local REMOVED=$(($(wc -l < "$TMPRAW") - FILTERED))
            [ "$REMOVED" -gt 0 ] && echo "  Filtered out $REMOVED broken configs"

            local TOTAL=$FILTERED
            if [ "$TOTAL" -eq 0 ]; then
              echo "  No configs to check"
              rm -f "$TMPFIXED"
              return 1
            fi

            echo "  Checking $TOTAL configs with Xray Checker (target=$TARGET)..."

            # –Ъ–Њ–і–Є—А—Г–µ–Љ –≤ Base64 –Є —А–∞–Ј–і–∞—С–Љ —З–µ—А–µ–Ј –ї–Њ–Ї–∞–ї—М–љ—Л–є HTTP-—Б–µ—А–≤–µ—А (–Њ–±—Е–Њ–і–Є—В –ї–Є–Љ–Є—В execve)
            local BASE64FILE=$(mktemp)
            base64 -w0 < "$TMPFIXED" > "$BASE64FILE"
            python3 -m http.server 18888 --directory "$(dirname "$BASE64FILE")" --bind 127.0.0.1 &
            local HTTP_PID=$!
            local B64NAME=$(basename "$BASE64FILE")
            sleep 1

            # –Ч–∞–њ—Г—Б–Ї–∞–µ–Љ Xray Checker (run-once: –њ—А–Њ–≤–µ—А—П–µ—В –Њ–і–Є–љ —А–∞–Ј –Є –≤—Л—Е–Њ–і–Є—В)
            SUBSCRIPTION_URL="http://127.0.0.1:18888/$B64NAME" ./xray-checker \
              --proxy-timeout=15 \
              --proxy-check-interval=86400 \
              --proxy-check-method=ip \
              --subscription-update=false \
              --simulate-latency=false \
              --run-once \
              --metrics-port=2112 &
            local PID=$!

            # –Ц–і—С–Љ –њ–Њ–Ї–∞ –њ–Њ–і–љ–Є–Љ–µ—В—Б—П
            local WAIT=0
            until curl -sf http://localhost:2112/health >/dev/null 2>&1; do
              sleep 1
              WAIT=$((WAIT + 1))
              if [ "$WAIT" -ge 60 ]; then
                echo "  ERROR: Xray Checker didn't start in 60s"
                kill $PID 2>/dev/null
                kill $HTTP_PID 2>/dev/null
                rm -f "$TMPFIXED" "$BASE64FILE"
                return 1
              fi
            done
            echo "  Xray Checker started (pid=$PID)"

            # –Ц–і—С–Љ –њ–Њ–Ї–∞ Checker –Ј–∞–≥—А—Г–Ј–Є—В –Ї–Њ–љ—Д–Є–≥–Є –Є –љ–∞—З–љ—С—В –њ—А–Њ–≤–µ—А–Ї–Є
            sleep 5

            # –Я–Њ–ї–ї–Є–Љ API –њ–Њ–Ї–∞ –≤—Б–µ –њ—А–Њ–≤–µ—А–Ї–Є –љ–µ –Ј–∞–≤–µ—А—И–µ–љ—Л
            # --run-once: –њ—А–Њ—Ж–µ—Б—Б –Ј–∞–≤–µ—А—И–Є—В—Б—П –њ–Њ—Б–ї–µ –њ—А–Њ–≤–µ—А–Ї–Є –≤—Б–µ—Е –њ—А–Њ–Ї—Б–Є
            local POLLS=0
            local MAX_POLLS=480  # 16 –Љ–Є–љ (2101 √Ч 15 —Б–µ–Ї timeout / 60 вЙИ 8.7 –Љ–Є–љ + –Ј–∞–њ–∞—Б)
            while [ "$POLLS" -lt "$MAX_POLLS" ]; do
              # –Я—А–Њ–≤–µ—А—П–µ–Љ —З—В–Њ –њ—А–Њ—Ж–µ—Б—Б –µ—Й—С –ґ–Є–≤
              if ! kill -0 $PID 2>/dev/null; then
                echo "  Xray Checker finished (process exited)"
                break
              fi
              local STATUS=$(curl -sf http://localhost:2112/api/v1/status 2>/dev/null)
              if [ -n "$STATUS" ]; then
                local ST=$(echo "$STATUS" | jq -r '.data.total // 0')
                local SO=$(echo "$STATUS" | jq -r '.data.online // 0')
                local SF=$(echo "$STATUS" | jq -r '.data.offline // 0')
                echo "  Poll $POLLS: total=$ST online=$SO offline=$SF"
                if [ "$ST" -gt 0 ] && [ "$ST" -eq "$((SO + SF))" ]; then
                  echo "  All $ST configs checked"
                  break
                fi
              fi
              sleep 2
              POLLS=$((POLLS + 1))
            done

            # –Ф–Њ–ґ–Є–і–∞–µ–Љ—Б—П –Ј–∞–≤–µ—А—И–µ–љ–Є—П –њ—А–Њ—Ж–µ—Б—Б–∞
            wait $PID 2>/dev/null || true

            # –Я–Њ–ї—Г—З–∞–µ–Љ –Є–љ–і–µ–Ї—Б—Л –ґ–Є–≤—Л—Е –Ї–Њ–љ—Д–Є–≥–Њ–≤
            local PROXIES=$(curl -sf http://localhost:2112/api/v1/proxies 2>/dev/null)
            kill $PID 2>/dev/null
            kill $HTTP_PID 2>/dev/null
            rm -f "$BASE64FILE"

            if [ -z "$PROXIES" ]; then
              echo "  ERROR: failed to get proxy results"
              rm -f "$TMPFIXED"
              return 1
            fi

            local ALIVE=$(echo "$PROXIES" | jq -r '[.data[] | select(.online)] | length')
            echo "  Xray Checker: $ALIVE/$TOTAL alive"

            if [ "$ALIVE" -eq 0 ]; then
              rm -f "$TMPFIXED"
              return 1
            fi

            # –§–Є–ї—М—В—А—Г–µ–Љ –њ–Њ –Є–љ–і–µ–Ї—Б–∞–Љ –ґ–Є–≤—Л—Е
            echo "$PROXIES" | jq -r '.data[] | select(.online) | .index' | while read -r idx; do
              sed -n "$((idx + 1))p" "$TMPFIXED"
            done | head -n "$TARGET" > "$OUTFILE"

            local FINAL=$(wc -l < "$OUTFILE")
            echo "  Result: $FINAL alive configs saved"
            rm -f "$TMPFIXED"
            return 0
          }

          # TCP connect –њ—А–Њ–≤–µ—А–Ї–∞ (–±—Л—Б—В—А–∞—П –∞–ї—М—В–µ—А–љ–∞—В–Є–≤–∞)
          check_with_tcp() {
            local TMPRAW="$1"
            local TARGET="$2"
            local OUTFILE="$3"

            local TMPFIXED=$(mktemp)
            grep -vE 'security=(false|none)' "$TMPRAW" | grep -vE '^\s*$' > "$TMPFIXED"
            local FILTERED=$(wc -l < "$TMPFIXED")
            local REMOVED=$(($(wc -l < "$TMPRAW") - FILTERED))
            [ "$REMOVED" -gt 0 ] && echo "  Filtered out $REMOVED broken configs"

            local TOTAL=$FILTERED
            if [ "$TOTAL" -eq 0 ]; then
              echo "  No configs to check"
              rm -f "$TMPFIXED"
              return 1
            fi

            echo "  Checking $TOTAL configs with TCP connect (target=$TARGET)..."

            local TMPALIVE=$(mktemp)
            local CHECKED=0
            local ALIVE=0

            while IFS= read -r LINE; do
              CHECKED=$((CHECKED + 1))
              local HOST=""
              local PORT=""

              if echo "$LINE" | grep -q '^vmess://'; then
                local B64=$(echo "$LINE" | sed 's|^vmess://||')
                local JSON=$(echo "$B64" | base64 -d 2>/dev/null)
                HOST=$(echo "$JSON" | jq -r '.add // empty')
                PORT=$(echo "$JSON" | jq -r '.port // empty')
              else
                HOST=$(echo "$LINE" | sed -E 's|^[a-z]+://[^@]*@([^:?#]+).*|\1|')
                PORT=$(echo "$LINE" | sed -E 's|^[a-z]+://[^@]*@[^:?#]+:([0-9]+).*|\1|')
              fi

              if [ -z "$HOST" ] || [ -z "$PORT" ]; then
                continue
              fi

              if nc -z -w5 "$HOST" "$PORT" 2>/dev/null; then
                echo "$LINE" >> "$TMPALIVE"
                ALIVE=$((ALIVE + 1))
                if [ "$ALIVE" -ge "$TARGET" ]; then
                  break
                fi
              fi
            done < "$TMPFIXED"

            echo "  TCP connect: $ALIVE/$CHECKED alive (checked $CHECKED of $TOTAL)"

            if [ "$ALIVE" -eq 0 ]; then
              rm -f "$TMPFIXED" "$TMPALIVE"
              return 1
            fi

            head -n "$TARGET" "$TMPALIVE" > "$OUTFILE"
            local FINAL=$(wc -l < "$OUTFILE")
            echo "  Result: $FINAL alive configs saved"
            rm -f "$TMPFIXED" "$TMPALIVE"
            return 0
          }

          fetch_and_save() {
            local FILENAME="$1"
            local TARGET="$2"
            local OUTFILE="configs/$FILENAME"

            # –Ю–њ—А–µ–і–µ–ї—П–µ–Љ –Ї–∞–Ї–Њ–є —З–µ–Ї–µ—А –Є—Б–њ–Њ–ї—М–Ј–Њ–≤–∞—В—М
            local CHECKER_TYPE
            if [ -n "${INPUT_CHECKER:-}" ] && [ "$INPUT_CHECKER" != "" ]; then
              CHECKER_TYPE="$INPUT_CHECKER"
            else
              CHECKER_TYPE=$(jq -r "[.lists[] | select(.filename == \"$FILENAME\") | .checker // \"sing-box\"] | .[0]" sources.json)
            fi

            echo "=== $FILENAME: target=$TARGET, checker=$CHECKER_TYPE ==="

            # –°–Њ–±–Є—А–∞–µ–Љ —Б—Л—А—Л–µ –Ї–Њ–љ—Д–Є–≥–Є —Б–Њ –≤—Б–µ—Е –Є—Б—В–Њ—З–љ–Є–Ї–Њ–≤ –≤ –Њ–і–Є–љ —Д–∞–є–ї
            local TMPRAW=$(mktemp)
            > "$TMPRAW"

            local SUM_TARGET=0
            while IFS= read -r ENTRY; do
              local ITEMS=$(echo "$ENTRY" | jq -r '.count')
              local PROTOCOLS=$(echo "$ENTRY" | jq -r '.protocols // ["vless"] | join(",")')
              local RANDOMIZE=$(echo "$ENTRY" | jq -r '.random // false')

              if [ "${INPUT_COUNT:-0}" != "0" ] && [ -n "${INPUT_COUNT:-}" ]; then
                ITEMS="$INPUT_COUNT"
              fi
              if [ -n "${INPUT_PROTOCOLS:-}" ]; then
                PROTOCOLS="$INPUT_PROTOCOLS"
              fi

              [ "$ITEMS" = "null" ] || [ -z "$ITEMS" ] && ITEMS=10
              SUM_TARGET=$((SUM_TARGET + ITEMS))

              local GREP_PATTERN="^($(echo "$PROTOCOLS" | tr ',' '|'))://"

              local SRC_COUNT=$(echo "$ENTRY" | jq -r '.sources | length')
              for (( si=0; si<SRC_COUNT; si++ )); do
                local URL=$(echo "$ENTRY" | jq -r ".sources[$si]")
                echo "  <- $URL (protocols=$PROTOCOLS, count=$ITEMS, random=$RANDOMIZE)"
                curl -sL "$URL" | grep -E "$GREP_PATTERN" >> "$TMPRAW"
              done
            done < <(jq -c ".lists[] | select(.filename == \"$FILENAME\")" sources.json)

            # –Я–µ—А–µ–Љ–µ—И–Є–≤–∞–µ–Љ –µ—Б–ї–Є –љ—Г–ґ–љ–Њ
            local ANY_RANDOM=$(jq -r "[.lists[] | select(.filename == \"$FILENAME\") | .random // false] | any" sources.json)
            if [ "$ANY_RANDOM" = "true" ]; then
              shuf "$TMPRAW" -o "$TMPRAW"
            fi

            local RAWTOTAL=$(wc -l < "$TMPRAW")
            echo "  Raw total: $RAWTOTAL configs"

            if [ "$RAWTOTAL" -eq 0 ]; then
              echo "  WARNING: no configs fetched"
              rm -f "$TMPRAW"
              return
            fi

            if [ "$CHECKER_TYPE" = "xray" ]; then
              if check_with_xray "$TMPRAW" "$SUM_TARGET" "$OUTFILE"; then
                rm -f "$TMPRAW"
                return
              fi
            elif [ "$CHECKER_TYPE" = "tcp" ]; then
              if check_with_tcp "$TMPRAW" "$SUM_TARGET" "$OUTFILE"; then
                rm -f "$TMPRAW"
                return
              fi
            else
              if check_with_singbox "$TMPRAW" "$SUM_TARGET" "$OUTFILE"; then
                rm -f "$TMPRAW"
                return
              fi
            fi

            # Fallback: –µ—Б–ї–Є —З–µ–Ї–µ—А –љ–µ –і–∞–ї —А–µ–Ј—Г–ї—М—В–∞—В–Њ–≤ вАФ —Б–Њ—Е—А–∞–љ—П–µ–Љ —Б—В–∞—А—Л–є —Д–∞–є–ї
            if [ -f "$OUTFILE" ] && [ -s "$OUTFILE" ]; then
              echo "  WARNING: no alive configs, keeping old file ($(wc -l < "$OUTFILE") configs)"
            else
              echo "  WARNING: no alive configs and no old file to keep"
            fi
            rm -f "$TMPRAW"
          }

          # –Ю–њ—А–µ–і–µ–ї—П–µ–Љ —З—В–Њ –Ј–∞–њ—Г—Б–Ї–∞—В—М
          INPUT_URL="${{ github.event.inputs.url }}"
          INPUT_COUNT="${{ github.event.inputs.count }}"
          INPUT_FILENAME="${{ github.event.inputs.filename }}"
          INPUT_PROTOCOLS="${{ github.event.inputs.protocols }}"
          INPUT_CHECKER="${{ github.event.inputs.checker }}"

          if [ -n "$INPUT_URL" ]; then
            # –†—Г—З–љ–Њ–є –Ј–∞–њ—Г—Б–Ї —Б URL
            if [ -z "$INPUT_FILENAME" ]; then
              echo "Error: filename required when url specified"
              exit 1
            fi
            COUNT="$INPUT_COUNT"
            [ "$COUNT" = "0" ] || [ -z "$COUNT" ] && COUNT=20
            PROTOCOLS="$INPUT_PROTOCOLS"
            [ -z "$PROTOCOLS" ] && PROTOCOLS="vless"
            echo "=== $INPUT_FILENAME: target=$COUNT, protocols=$PROTOCOLS ==="
            GREP_PATTERN="^($(echo "$PROTOCOLS" | tr ',' '|'))://"
            TMPRAW=$(mktemp)
            curl -sL "$INPUT_URL" | grep -E "$GREP_PATTERN" > "$TMPRAW"
            mkdir -p configs
            OUTFILE="configs/$INPUT_FILENAME"
            if [ "$INPUT_CHECKER" = "xray" ]; then
              CHECKER_FN="check_with_xray"
            elif [ "$INPUT_CHECKER" = "tcp" ]; then
              CHECKER_FN="check_with_tcp"
            else
              CHECKER_FN="check_with_singbox"
            fi
            if ! $CHECKER_FN "$TMPRAW" "$COUNT" "$OUTFILE"; then
              if [ -f "$OUTFILE" ] && [ -s "$OUTFILE" ]; then
                echo "  WARNING: no alive configs, keeping old file"
              fi
            fi
            rm -f "$TMPRAW"
          else
            # –Т—Б–µ —Б–њ–Є—Б–Ї–Є –Є–Ј sources.json
            if [ ! -f sources.json ]; then
              echo "No sources.json found"
              exit 0
            fi

            LIST_COUNT=$(jq '.lists | length' sources.json)
            echo "Found $LIST_COUNT entries in sources.json"

            mkdir -p configs

            UNIQUE_FILES=$(jq -r '[.lists[].filename] | unique | .[]' sources.json)
            for FILENAME in $UNIQUE_FILES; do
              TARGET=$(jq -r "[.lists[] | select(.filename == \"$FILENAME\") | .count] | add" sources.json)
              [ "$TARGET" = "null" ] && TARGET=20
              fetch_and_save "$FILENAME" "$TARGET"
            done
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add configs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update configs $(TZ=Europe/Moscow date '+%Y-%m-%d %H:%M')"
            git pull --rebase
            git push
          fi
