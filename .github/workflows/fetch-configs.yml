name: Fetch VPN Configs

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL –Є—Б—В–Њ—З–љ–Є–Ї–∞ (–Њ—Б—В–∞–≤—М—В–µ –њ—Г—Б—В—Л–Љ –і–ї—П –Њ–±–љ–Њ–≤–ї–µ–љ–Є—П –≤—Б–µ—Е –Є–Ј sources.json)"
        required: false
        type: string
      count:
        description: "–°–Ї–Њ–ї—М–Ї–Њ –Ї–Њ–љ—Д–Є–≥–Њ–≤ –≤–Ј—П—В—М –Є–Ј URL (0 = –њ–Њ —Г–Љ–Њ–ї—З–∞–љ–Є—О –Є–Ј sources.json)"
        required: false
        default: "0"
        type: string
      filename:
        description: "–Ш–Љ—П –≤—Л—Е–Њ–і–љ–Њ–≥–Њ —Д–∞–є–ї–∞ (–Њ–±—П–Ј–∞—В–µ–ї—М–љ–Њ –µ—Б–ї–Є —Г–Ї–∞–Ј–∞–љ url)"
        required: false
        type: string
      protocols:
        description: "–Я—А–Њ—В–Њ–Ї–Њ–ї—Л —З–µ—А–µ–Ј –Ј–∞–њ—П—В—Г—О (vless,vmess,trojan,shadowsocks,hysteria2,tuic)"
        required: false
        default: "vless"
        type: string
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and check configs
        run: |
          check_alive() {
            local HOSTPORT="$1"
            local HOST=$(echo "$HOSTPORT" | cut -d: -f1)
            local PORT=$(echo "$HOSTPORT" | cut -d: -f2)
            [ -z "$HOST" ] || [ -z "$PORT" ] && return 1
            timeout 3 bash -c "echo >/dev/tcp/$HOST/$PORT" 2>/dev/null
          }

          extract_hostport() {
            echo "$1" | sed -n 's|.*@\([^?]*\).*|\1|p'
          }

          fetch_and_filter() {
            local URL="$1"
            local TARGET="$2"
            local FILENAME="$3"
            local RANDOMIZE="$4"
            local PROTOCOLS="$5"
            local OUTFILE="configs/$FILENAME"

            echo "=== $FILENAME: target=$TARGET, protocols=$PROTOCOLS ==="

            # –°—В—А–Њ–Є–Љ grep-–њ–∞—В—В–µ—А–љ –Є–Ј –њ—А–Њ—В–Њ–Ї–Њ–ї–Њ–≤: ^(vless|vmess|trojan)://
            local GREP_PATTERN="^($(echo "$PROTOCOLS" | tr ',' '|'))://"

            # –С–µ—А—С–Љ —Б –Ј–∞–њ–∞—Б–Њ–Љ (x3), —З—В–Њ–±—Л –±—Л–ї–Њ –Є–Ј —З–µ–≥–Њ –і–Њ–Ї–∞—З–∞—В—М
            local FETCH=$((TARGET * 3))
            local TMPRAW=$(mktemp)

            echo "  Fetching $FETCH configs from source..."
            if [ "$RANDOMIZE" = "true" ]; then
              echo "  Mode: random"
              curl -sL "$URL" | grep -E "$GREP_PATTERN" | shuf | head -n "$FETCH" > "$TMPRAW"
            else
              echo "  Mode: sequential"
              curl -sL "$URL" | grep -E "$GREP_PATTERN" | head -n "$FETCH" > "$TMPRAW"
            fi
            local TOTAL=$(wc -l < "$TMPRAW")
            echo "  Got $TOTAL configs from source"

            local ALIVEFILE=$(mktemp)
            local ALIVE=0
            local CHECKED=0

            while IFS= read -r LINE; do
              [ -z "$LINE" ] && continue
              CHECKED=$((CHECKED + 1))
              local HP=$(extract_hostport "$LINE")

              if check_alive "$HP"; then
                echo "  ALIVE: $HP"
                echo "$LINE" >> "$ALIVEFILE"
                ALIVE=$((ALIVE + 1))
              else
                echo "  DEAD:  $HP"
              fi

              # –Ф–Њ—Б—В–∞—В–Њ—З–љ–Њ –ґ–Є–≤—Л—Е вАФ —Б—В–Њ–њ
              [ "$ALIVE" -ge "$TARGET" ] && break
            done < "$TMPRAW"

            # –С–µ—А—С–Љ —А–Њ–≤–љ–Њ TARGET –ґ–Є–≤—Л—Е
            head -n "$TARGET" "$ALIVEFILE" > "$OUTFILE"
            local FINAL=$(wc -l < "$OUTFILE")

            rm -f "$TMPRAW" "$ALIVEFILE"
            echo "  Result: $FINAL/$TARGET alive configs saved"
          }

          # –Ю–њ—А–µ–і–µ–ї—П–µ–Љ —З—В–Њ –Ј–∞–њ—Г—Б–Ї–∞—В—М
          INPUT_URL="${{ github.event.inputs.url }}"
          INPUT_COUNT="${{ github.event.inputs.count }}"
          INPUT_FILENAME="${{ github.event.inputs.filename }}"
          INPUT_PROTOCOLS="${{ github.event.inputs.protocols }}"

          if [ -n "$INPUT_URL" ]; then
            # –†—Г—З–љ–Њ–є –Ј–∞–њ—Г—Б–Ї —Б URL
            if [ -z "$INPUT_FILENAME" ]; then
              echo "Error: filename required when url specified"
              exit 1
            fi
            COUNT="$INPUT_COUNT"
            [ "$COUNT" = "0" ] || [ -z "$COUNT" ] && COUNT=20
            PROTOCOLS="$INPUT_PROTOCOLS"
            [ -z "$PROTOCOLS" ] && PROTOCOLS="vless"
            # –†—Г—З–љ–Њ–є –Ј–∞–њ—Г—Б–Ї вАФ –њ–µ—А–µ–Љ–µ—И–Є–≤–∞–µ–Љ –њ–Њ —Г–Љ–Њ–ї—З–∞–љ–Є—О
            fetch_and_filter "$INPUT_URL" "$COUNT" "$INPUT_FILENAME" "true" "$PROTOCOLS"
          else
            # –Т—Б–µ —Б–њ–Є—Б–Ї–Є –Є–Ј sources.json
            if [ ! -f sources.json ]; then
              echo "No sources.json found"
              exit 0
            fi

            LIST_COUNT=$(jq '.lists | length' sources.json)
            echo "Found $LIST_COUNT lists in sources.json"

            for i in $(seq 0 $((LIST_COUNT - 1))); do
              URL=$(jq -r ".lists[$i].url" sources.json)
              FILENAME=$(jq -r ".lists[$i].filename" sources.json)
              ITEMS=$(jq -r ".lists[$i].count" sources.json)
              PROTOCOLS=$(jq -r '.lists['"$i"'].protocols // ["vless"] | join(",")' sources.json)
              RANDOMIZE=$(jq -r '.lists['"$i"'].random // false' sources.json)

              # –Т—Е–Њ–і–љ–Њ–є count –њ–µ—А–µ–Ї—А—Л–≤–∞–µ—В sources.json
              if [ "$INPUT_COUNT" != "0" ] && [ -n "$INPUT_COUNT" ]; then
                ITEMS="$INPUT_COUNT"
              fi

              # –Т—Е–Њ–і–љ–Њ–є protocols –њ–µ—А–µ–Ї—А—Л–≤–∞–µ—В sources.json
              if [ -n "$INPUT_PROTOCOLS" ]; then
                PROTOCOLS="$INPUT_PROTOCOLS"
              fi

              [ "$ITEMS" = "null" ] || [ -z "$ITEMS" ] && ITEMS=20

              fetch_and_filter "$URL" "$ITEMS" "$FILENAME" "$RANDOMIZE" "$PROTOCOLS"
            done
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add configs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update configs $(TZ=Europe/Moscow date '+%Y-%m-%d %H:%M')"
            git push
          fi
