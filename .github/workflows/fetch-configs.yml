name: Fetch VPN Configs

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL источника (оставьте пустым для обновления всех из sources.json)"
        required: false
        type: string
      count:
        description: "Сколько конфигов взять из URL (0 = 20 по умолчанию)"
        required: false
        default: "0"
        type: string
      filename:
        description: "Имя выходного файла (обязательно если указан url)"
        required: false
        type: string
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Fetch single list
        if: ${{ github.event.inputs.url != '' && github.event.inputs.url != null }}
        run: |
          URL="${{ github.event.inputs.url }}"
          COUNT="${{ github.event.inputs.count }}"
          FILENAME="${{ github.event.inputs.filename }}"

          if [ -z "$FILENAME" ]; then
            echo "Error: filename is required when url is specified"
            exit 1
          fi

          if [ "$COUNT" = "0" ] || [ -z "$COUNT" ]; then
            COUNT=20
          fi

          echo "Fetching $COUNT configs from $URL -> $FILENAME"
          curl -sL "$URL" | grep '^vless://' | head -n "$COUNT" > "configs/$FILENAME"

          LINES=$(wc -l < "configs/$FILENAME")
          echo "Saved $LINES configs to configs/$FILENAME"

      - name: Fetch all lists from sources.json
        if: ${{ github.event.inputs.url == '' || github.event.inputs.url == null }}
        run: |
          if [ ! -f sources.json ]; then
            echo "No sources.json found, skipping"
            exit 0
          fi

          INPUT_COUNT="${{ github.event.inputs.count }}"

          LIST_COUNT=$(jq '.lists | length' sources.json)
          echo "Found $LIST_COUNT lists in sources.json"

          for i in $(seq 0 $((LIST_COUNT - 1))); do
            URL=$(jq -r ".lists[$i].url" sources.json)
            FILENAME=$(jq -r ".lists[$i].filename" sources.json)
            ITEMS=$(jq -r ".lists[$i].count" sources.json)

            # Входной count перекрывает значение из sources.json
            if [ "$INPUT_COUNT" != "0" ] && [ -n "$INPUT_COUNT" ]; then
              ITEMS="$INPUT_COUNT"
            fi

            if [ "$ITEMS" = "null" ] || [ -z "$ITEMS" ]; then
              ITEMS=20
            fi

            echo "Fetching $ITEMS configs from $URL -> $FILENAME"
            curl -sL "$URL" | grep '^vless://' | head -n "$ITEMS" > "configs/$FILENAME"

            LINES=$(wc -l < "configs/$FILENAME")
            echo "  Saved $LINES configs"
          done

      - name: Check configs liveness
        run: |
          echo "Checking TCP connectivity for all configs..."
          for FILE in configs/*.txt; do
            [ -f "$FILE" ] || continue
            ALIVE=0
            TOTAL=0
            TMPFILE=$(mktemp)

            while IFS= read -r LINE; do
              [ -z "$LINE" ] && continue
              TOTAL=$((TOTAL + 1))

              # Извлекаем host:port из vless://uuid@host:port?params
              HOSTPORT=$(echo "$LINE" | sed -n 's|.*@\([^?]*\).*|\1|p')
              HOST=$(echo "$HOSTPORT" | cut -d: -f1)
              PORT=$(echo "$HOSTPORT" | cut -d: -f2)

              if [ -z "$HOST" ] || [ -z "$PORT" ]; then
                echo "  SKIP (parse error): $HOSTPORT"
                continue
              fi

              # TCP check с таймаутом 3 сек
              if timeout 3 bash -c "echo >/dev/tcp/$HOST/$PORT" 2>/dev/null; then
                echo "  ALIVE: $HOST:$PORT"
                echo "$LINE" >> "$TMPFILE"
                ALIVE=$((ALIVE + 1))
              else
                echo "  DEAD:  $HOST:$PORT"
              fi
            done < "$FILE"

            mv "$TMPFILE" "$FILE"
            echo "$FILE: $ALIVE/$TOTAL alive"
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add configs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update configs $(TZ=Europe/Moscow date '+%Y-%m-%d %H:%M')"
            git push
          fi
